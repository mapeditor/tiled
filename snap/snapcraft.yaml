name: tiled
adopt-info: tiled
license: GPL-2.0
base: core24

grade: stable
confinement: strict

# The kde-neon-6 extension supplies the Qt 6 SDK at build time (via the
# kde-qt6-core24-sdk content snap) and Qt 6 / KF6 runtime libraries via the
# kf6-core24 content snap. It also auto-adds a desktop-launch command-chain
# and the standard desktop / opengl / wayland / x11 / unity7 / network plugs
# to every app that lists it in `extensions`.

apps:
  tiled:
    extensions: [kde-neon-6]
    command: usr/bin/tiled
    common-id: org.mapeditor.Tiled.desktop
    plugs:
      - home
      - removable-media
  tmxviewer:
    extensions: [kde-neon-6]
    command: usr/bin/tmxviewer
    plugs: &basic-plugs
      - home
      - removable-media
  tmxrasterizer:
    extensions: [kde-neon-6]
    command: usr/bin/tmxrasterizer
    plugs: *basic-plugs
  terraingenerator:
    extensions: [kde-neon-6]
    command: usr/bin/terraingenerator
    plugs: *basic-plugs

parts:
  tiled:
    plugin: make
    override-pull: |
      craftctl default
      craftctl set version="$(git describe | sed 's/v//')"
    override-build: |
      qbs setup-toolchains --detect
      # Qt 6 ships qmake as `qmake6`; the kde-neon-6 extension exposes that on
      # PATH but not a `qmake` symlink. qbs's Qt module provider scans PATH
      # for `qmake`, so create a shim that points at qmake6.
      mkdir -p "${CRAFT_PART_BUILD}/.qmake-shim"
      ln -sf "$(command -v qmake6)" "${CRAFT_PART_BUILD}/.qmake-shim/qmake"
      export PATH="${CRAFT_PART_BUILD}/.qmake-shim:${PATH}"
      qbs build --jobs "${CRAFT_PARALLEL_BUILD_COUNT}" --command-echo-mode command-line config:release qbs.installPrefix:"/usr" projects.Tiled.version:$(craftctl get version) projects.Tiled.useRPaths:false
      qbs install --install-root "${CRAFT_PART_INSTALL}" config:release
    parse-info:
      - usr/share/metainfo/org.mapeditor.Tiled.appdata.xml
    source: .
    build-packages:
      - pkg-config
    # FIXME: Python plugin compiles and loads, but can't find platform libraries
    #  - python-dev
      - qbs
      - zlib1g-dev
      - libzstd-dev
    stage-packages:
    #  - libpython2.7
      - libzstd1

  qaseprite:
    source: https://github.com/mapeditor/qaseprite/releases/download/1.0.3/qaseprite-1.0.3-source.tar.gz
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_BUILD_TYPE=Release
      - -DUSE_SHARED_ZLIB=on
      - -DUSE_SHARED_LIBPNG=on
      - -DUSE_SHARED_PIXMAN=on
      - -DUSE_SHARED_FREETYPE=on
      - -DUSE_SHARED_HARFBUZZ=on
    build-packages:
      - libfreetype-dev
      - libgl1-mesa-dev
      - libharfbuzz-dev
      - libpixman-1-dev
      - libxcursor-dev
      - libxi-dev
      - zlib1g-dev
    stage-packages:
      - libfreetype6
      - libharfbuzz0b
      - libpixman-1-0
      - libxcursor1
      - libxi6
      - zlib1g
