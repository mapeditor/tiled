name: Update Homebrew Cask

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to bump (e.g. v1.11.2). Defaults to the triggering release tag.'
        required: false

jobs:
  bump-cask:
    name: Bump Homebrew cask
    runs-on: macos-latest

    if: github.repository == 'mapeditor/tiled'

    steps:
      - name: Update Homebrew cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+ ]]; then
            echo "Error: '$VERSION' is not a valid version. Provide a tag like v1.11.2." && exit 1
          fi
          brew bump-cask-pr --version "$VERSION" --fork-org mapeditor --no-browse tiled